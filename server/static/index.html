<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DynamoDB-Sage</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>DynamoDB-Sage</h1>
    <nav>
    <button class="tab-btn" data-tab="chat">Chat</button>
    <button class="tab-btn active" data-tab="tools">Tools</button>
    <button class="tab-btn" data-tab="notifications">Notifications <span id="notif-badge" class="badge hidden">0</span></button>
    <button class="tab-btn" data-tab="metrics">Metrics</button>
    </nav>
  </header>

  <main>
    <!-- Tools Tab -->
    <section id="tab-tools" class="tab-content active card">
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <select id="tool-select"><option value=""></option></select>
        <textarea id="args-input" placeholder='{"tableName": "..."}' rows="3"></textarea>
        <button id="send-btn">Send</button>
      </div>
    </section>
<section id="tab-chat" class="tab-content card">
  <div id="llm-messages" class="chat-area"></div>
  <div id="llm-input-area" class="chat-input-area">
    <input type="text" id="llm-input" placeholder="Ask the LLM..." />
    <button id="llm-send-btn">Send</button>
  </div>
</section>

  

    <!-- Notifications Tab -->
    <section id="tab-notifications" class="tab-content">
      <div id="notif-list"></div>
    </section>

    <!-- Metrics Tab -->
    <section id="tab-metrics" class="tab-content">
      <div id="metrics-display">
        <p>Fetching metrics...</p>
      </div>
    </section>
  </main>
  <div id="toast-container"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
