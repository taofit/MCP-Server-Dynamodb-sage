version: "1.0"

global_limits:
  max_limit: 100
  default_limit: 20

sensitive_fields:
  - password
  - ssn
  - token
  - api_key
  - secret
  - card_number
  - credit_card

protected_tables:
  - Transactions
  - SystemConfig

tables:
  - name: "Users"
    pii_fields: ["email", "phone_number"] ## they may be the same as sensitive_fields
    read_only: false
    enforce_schema: true
    columns:
      user_id: "S"
      user_name: "S"
      age: "N"
      is_active: "BOOL"

  - name: "Orders"
    pii_fields: ["customer_name", "shipping_address"]
    read_only: false
    enforce_schema: false
    columns:
      customer_id: "S"
      customer_name: "S"
      shipping_address: "S"

  - name: "Human"
    pii_fields: ["religion"]
    read_only: false
    enforce_schema: true
    columns:
      id: "N"
      name: "S"
      religion: "S"
      price: "N"

risk_thresholds:
  table_size_mb: 10 # warn if table > 10MB
  scan_cost_usd: 0.05 # warn if scan costs > $0.05
  # Maximum number of items allowed in a single BatchDeleteItem request.
  # Raising this value increases cost and data-loss risk.
  batch_delete_count: 100 # warn if deleting > 100 items
  batch_get_count: 100 # warn if getting > 100 items
  batch_put_count: 100 # warn if putting > 100 items
  max_throughput_increase: 2000
  update_expression_depth: 5
