<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="1200" viewBox="0 0 1100 1200" role="img" aria-labelledby="title desc">
  <title id="title">DynamoDB Sage Architecture Flow</title>
  <desc id="desc">Three entry points: MCP Streamable HTTP (/), MCP SSE (/sse), and Chat UI (POST /api/chat). Both MCP and Chat paths share Guardrail, isLargeOperation fork, sync/async execution, and notifications. Chat UI additionally has an agentic loop via Claude API, and the Claude-driven tool calls also pass through the Guardrail (+ risk analysis) before execution.</desc>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8Z" fill="#475569"/></marker>
    <marker id="ar" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8Z" fill="#e11d48"/></marker>
    <marker id="ag" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8Z" fill="#059669"/></marker>
    <marker id="ap" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8Z" fill="#7c3aed"/></marker>
    <marker id="ao" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8Z" fill="#ea580c"/></marker>
    <style>
      .t{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:22px;fill:#0f172a;font-weight:700}
      .s{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;fill:#94a3b8;font-weight:700;letter-spacing:1.5px}
      .n{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;fill:#0f172a;font-weight:600}
      .d{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11px;fill:#64748b}
      .g{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:10px;font-weight:600}
      .l{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:10px;fill:#64748b}
    </style>
  </defs>
  <rect width="1100" height="1200" fill="#fff"/>

  <text x="550" y="32" text-anchor="middle" class="t">DynamoDB Sage — Architecture Flow</text>

  <!-- ══════ ROW 1: THREE ENTRY POINTS ══════ -->
  <text x="550" y="60" text-anchor="middle" class="s">ENTRY POINTS</text>

  <rect x="40" y="72" width="220" height="52" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="94" text-anchor="middle" class="n">MCP Client</text>
  <text x="150" y="108" text-anchor="middle" class="d">Claude Desktop / opencode</text>
  <text x="150" y="118" text-anchor="middle" class="g" fill="#2563eb">POST / (Streamable HTTP)</text>

  <rect x="300" y="72" width="220" height="52" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="410" y="94" text-anchor="middle" class="n">MCP Client (Legacy)</text>
  <text x="410" y="108" text-anchor="middle" class="d">Older MCP clients</text>
  <text x="410" y="118" text-anchor="middle" class="g" fill="#2563eb">GET /sse</text>

  <rect x="560" y="72" width="220" height="52" rx="10" fill="#fdf4ff" stroke="#a855f7" stroke-width="2"/>
  <text x="670" y="94" text-anchor="middle" class="n">Chat UI</text>
  <text x="670" y="108" text-anchor="middle" class="d">Browser dashboard</text>
  <text x="670" y="118" text-anchor="middle" class="g" fill="#7c3aed">POST /api/chat (SSE)</text>

  <!-- ══════ ROW 2: SERVERS ══════ -->
  <text x="550" y="155" text-anchor="middle" class="s">SERVERS</text>

  <rect x="40" y="168" width="220" height="48" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="150" y="196" text-anchor="middle" class="n">Go MCP Server</text>

  <rect x="300" y="168" width="220" height="48" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="410" y="196" text-anchor="middle" class="n">Go MCP Server</text>

  <rect x="560" y="168" width="220" height="48" rx="10" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="670" y="190" text-anchor="middle" class="n">Anthropic Claude API</text>
  <text x="670" y="204" text-anchor="middle" class="d">Messages + Tools (stream)</text>

  <!-- Arrows row 1 → 2 -->
  <path d="M150 124 L150 168" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#a)"/>
  <path d="M410 124 L410 168" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#a)"/>
  <path d="M670 124 L670 168" fill="none" stroke="#a855f7" stroke-width="2" marker-end="url(#ap)"/>

  <!-- ══════ ROW 3: SHARED PIPELINE — BOTH PATHS ══════ -->
  <text x="400" y="248" text-anchor="middle" class="s">SHARED PIPELINE — MCP &amp; CHAT PATHS</text>

  <!-- Guardrail + Risk (shared) -->
  <rect x="40" y="262" width="220" height="44" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="150" y="289" text-anchor="middle" class="n">Guardrail + Risk</text>
  <text x="150" y="300" text-anchor="middle" class="l">RISK_LEVELS mapping</text>

  <!-- Both MCP servers → Guardrail -->
  <path d="M150 216 L150 262" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#a)"/>
  <path d="M410 216 L410 240 L150 240 L150 262" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#a)"/>

  <!-- Chat UI → Guardrail: Claude-driven tool calls also pass through guardrail + risk -->
  <path d="M555 124 L555 255 L260 255 L260 262" fill="none" stroke="#a855f7" stroke-width="2" marker-end="url(#ap)"/>
  <text x="300" y="258" class="g" fill="#a855f7">chat → guardrail</text>

  <!-- isLargeOperation? -->
  <rect x="40" y="330" width="220" height="44" rx="22" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="150" y="357" text-anchor="middle" class="n">isLargeOperation?</text>

  <path d="M150 306 L150 330" fill="none" stroke="#d97706" stroke-width="2" marker-end="url(#a)"/>
  <text x="165" y="322" class="g" fill="#d97706">risk ok</text>

  <!-- ══════ ROW 4: SYNC PATH ══════ -->
  <text x="150" y="400" text-anchor="middle" class="s" fill="#16a34a">SYNC</text>

  <rect x="40" y="410" width="200" height="40" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="140" y="435" text-anchor="middle" class="n" fill="#16a34a">DynamoDB (direct)</text>

  <path d="M150 374 L150 410" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
  <text x="165" y="396" class="g" fill="#16a34a">sync</text>

  <rect x="40" y="470" width="200" height="40" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="140" y="495" text-anchor="middle" class="n">Result</text>

  <path d="M140 450 L140 470" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>

  <!-- ══════ ROW 4: ASYNC PATH ══════ -->
  <text x="370" y="400" text-anchor="middle" class="s" fill="#d97706">ASYNC</text>

  <rect x="270" y="410" width="200" height="40" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="370" y="435" text-anchor="middle" class="n">Kafka Producer</text>

  <path d="M260 352 L370 352 L370 410" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <rect x="270" y="470" width="200" height="40" rx="20" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="370" y="495" text-anchor="middle" class="n" fill="#059669">dynamodb-sage-heavy-ops</text>

  <path d="M370 450 L370 470" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <rect x="270" y="530" width="200" height="40" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="370" y="555" text-anchor="middle" class="n">Job ID → Client</text>

  <path d="M370 510 L370 530" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <!-- ══════ ROW 5: KAFKA CONSUMER ══════ -->
  <text x="200" y="608" text-anchor="middle" class="s">KAFKA CONSUMER</text>

  <rect x="40" y="620" width="240" height="38" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="644" text-anchor="middle" class="n">Kafka Consumer Group</text>

  <path d="M370 570 L370 590 L160 590 L160 620" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <rect x="40" y="678" width="240" height="38" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="702" text-anchor="middle" class="n">processHeavyOp()</text>

  <path d="M160 658 L160 678" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <rect x="40" y="736" width="240" height="38" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="760" text-anchor="middle" class="n">executeJobOp()</text>

  <path d="M160 716 L160 736" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>

  <rect x="340" y="736" width="160" height="38" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="420" y="760" text-anchor="middle" class="n" fill="#16a34a">DynamoDB</text>

  <path d="M280 755 L340 755" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#ag)"/>
  <text x="310" y="745" class="l">batch write</text>

  <!-- ══════ ROW 6: NOTIFICATIONS ══════ -->
  <text x="700" y="608" text-anchor="middle" class="s">NOTIFICATIONS</text>

  <rect x="570" y="620" width="220" height="38" rx="10" fill="#fff1f2" stroke="#e11d48" stroke-width="2"/>
  <text x="680" y="644" text-anchor="middle" class="n" fill="#e11d48">sendMutationNotif()</text>

  <path d="M160 774 L160 800 L680 800 L680 658" fill="none" stroke="#e11d48" stroke-width="2" marker-end="url(#ar)"/>

  <rect x="570" y="678" width="220" height="38" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="680" y="702" text-anchor="middle" class="n" fill="#ea580c">SSE → Chat UI</text>

  <path d="M680 658 L680 678" fill="none" stroke="#ea580c" stroke-width="2" marker-end="url(#ao)"/>

  <rect x="570" y="736" width="220" height="38" rx="19" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="680" y="760" text-anchor="middle" class="n" fill="#059669">dynamodb-sage-notifications</text>

  <path d="M790 697 L830 697 L830 755 L790 755" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#ag)"/>

  <!-- ══════ ROW 7: CHAT AGENTIC LOOP (right side) ══════ -->
  <text x="860" y="248" text-anchor="middle" class="s">CHAT AGENTIC LOOP</text>

  <rect x="780" y="262" width="180" height="44" rx="10" fill="#fdf4ff" stroke="#a855f7" stroke-width="2"/>
  <text x="870" y="289" text-anchor="middle" class="n" fill="#7c3aed">executeToolByName()</text>

  <rect x="780" y="330" width="180" height="44" rx="10" fill="#fdf4ff" stroke="#a855f7" stroke-width="2"/>
  <text x="870" y="357" text-anchor="middle" class="n" fill="#7c3aed">ToolResult → Claude</text>

  <!-- Claude → executeToolByName -->
  <path d="M780 192 L870 192 L870 262" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#ap)"/>
  <text x="885" y="230" class="g" fill="#7c3aed">tool_use</text>

  <!-- Guardrail → executeToolByName -->
  <path d="M260 284 L780 284" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#ap)"/>
  <text x="520" y="274" class="g" fill="#7c3aed">risk ok → tool params</text>

  <!-- executeToolByName → ToolResult -->
  <path d="M870 306 L870 330" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#ap)"/>

  <!-- ToolResult → loop back to Claude -->
  <path d="M780 352 L720 352 L720 192 L780 192" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ap)"/>
  <text x="710" y="272" class="g" fill="#7c3aed" transform="rotate(-90,710,272)">agentic loop</text>

  <!-- Text response → stream back to Chat UI -->
  <path d="M780 192 L720 192 L720 98 L660 98" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ag)"/>
  <text x="720" y="148" class="l" fill="#059669">text (SSE stream)</text>

  <!-- Fail path -->
  <path d="M960 284 L1020 284" fill="none" stroke="#e11d48" stroke-width="2" marker-end="url(#ar)"/>
  <text x="990" y="274" class="g" fill="#e11d48">Fail → error</text>

  <!-- ══════ LEGEND ══════ -->
  <rect x="40" y="850" width="1020" height="48" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="60" y="870" class="s">LEGEND</text>
  <rect x="60" y="880" width="12" height="12" rx="3" fill="#eff6ff" stroke="#2563eb"/><text x="80" y="891" class="l">MCP Protocol</text>
  <rect x="180" y="880" width="12" height="12" rx="3" fill="#fdf4ff" stroke="#a855f7"/><text x="200" y="891" class="l">Chat / Agentic</text>
  <rect x="310" y="880" width="12" height="12" rx="3" fill="#fef3c7" stroke="#d97706"/><text x="330" y="891" class="l">Guardrail</text>
  <rect x="420" y="880" width="12" height="12" rx="3" fill="#f0fdf4" stroke="#16a34a"/><text x="440" y="891" class="l">Sync DynamoDB</text>
  <rect x="560" y="880" width="12" height="12" rx="3" fill="#ecfdf5" stroke="#059669"/><text x="580" y="891" class="l">Kafka / Async</text>
  <rect x="690" y="880" width="12" height="12" rx="3" fill="#fff1f2" stroke="#e11d48"/><text x="710" y="891" class="l">Alert</text>
  <rect x="780" y="880" width="12" height="12" rx="3" fill="#fff7ed" stroke="#ea580c"/><text x="800" y="891" class="l">SSE Stream</text>

</svg>
