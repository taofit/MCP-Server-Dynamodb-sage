services:
  app:
    build: .
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "2112:2112"
    env_file: .env
    environment:
      - KAFKA_BROKERS=kafka:9092
      - AWS_BASE_ENDPOINT=${AWS_BASE_ENDPOINT:-}
      - AWS_REGION=${AWS_REGION}
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
      - CONFIG_PATH=${CONFIG_PATH}
      - KAFKA_CONFIG_PATH=/app/config/kafka.yaml
      - DYNAMO_SAGE_DB=${DYNAMO_SAGE_DB}
      - DYNAMO_SAGE_ADDR=${DYNAMO_SAGE_ADDR}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - MCP_TRANSPORT_MODE=${MCP_TRANSPORT_MODE}
      - METRICS_ADDR=${METRICS_ADDR:-:2112}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_KEY_PARAM=${LLM_API_KEY_PARAM}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_TIMEOUT_SEC=${LLM_TIMEOUT_SEC}
      - LLM_BASE_URL=${LLM_BASE_URL}
    volumes:
      - ./.env:/app/.env
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  localstack:
    profiles: ["local"]
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=iam,sts,dynamodb,s3,ssm
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
      - DYNAMODB_SHARE_DB=1
    volumes:
      - "./scripts/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 2s
      retries: 20
 
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
      - KAFKA_HEAP_OPTS=-Xmx64m -Xms32m
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    mem_limit: 768m
    memswap_limit: 1024m
    ports:
      - "9092:9092"
      - "9093:9093"
    depends_on:
      - zookeeper
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_HEAP_OPTS=-Xmx384m -Xms192m
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_DELETE_TOPIC_ENABLE=true
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9092'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
  # ------------------------------------------------------------------
  # Init container – creates the heavy‑operations topic (ONE‑TIME)
  # ------------------------------------------------------------------
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    command: ["kafka-topics", "--bootstrap-server", "kafka:9092", "--create", "--if-not-exists", "--topic", "dynamodb-sage-heavy-ops", "--replication-factor", "1", "--partitions", "3"]
